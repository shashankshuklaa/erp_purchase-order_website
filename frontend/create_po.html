<!DOCTYPE html>
<html>
<head>

<title>Create Purchase Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">
<h4>Create Purchase Order</h4>
</div>

<div class="card-body">

<div class="mb-3">

<label class="form-label">Vendor</label>

<select id="vendorSelect" class="form-select"></select>

</div>

<h5>Products</h5>

<table class="table" id="productTable">

<thead>
<tr>
<th>Product</th>
<th>Quantity</th>
<th>Price</th>
</tr>
</thead>

<tbody></tbody>

</table>

<button class="btn btn-secondary" onclick="addRow()">Add Row</button>

<hr>

<button class="btn btn-primary" onclick="submitPO()">Submit Purchase Order</button>

</div>
</div>

<hr>

<div class="card mt-4">

<div class="card-header">
AI Product Description
</div>

<div class="card-body">

<input id="productName" class="form-control mb-2" placeholder="Product Name">

<input id="category" class="form-control mb-2" placeholder="Category">

<button class="btn btn-info" onclick="generateDescription()">Auto Description</button>

<textarea id="description" class="form-control mt-3" rows="3"></textarea>

</div>
</div>

</div>

<script src="script.js"></script>

<script>
loadVendors();
loadProducts();
addRow();
</script>

</body>
</html>
